networks:
  mymusic-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mymusic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mymusic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mymusic_password}
      POSTGRES_DB: ${DB_NAME:-mymusic_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mymusic-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-mymusic} -d ${DB_NAME:-mymusic_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mymusic-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mymusic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: mymusic-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      REDIS_HOST: redis
      DSP_URL: http://dsp:5000
    ports:
      - "3001:3001"
    volumes:
      # Mount source for hot reload — node_modules stays inside the container
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mymusic-net

  # ── Next.js Web App ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: mymusic-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/messages:/app/apps/web/messages
      - ./packages:/app/packages
    depends_on:
      - api
    networks:
      - mymusic-net

  # ── Python DSP Sidecar ────────────────────────────────────────────────────
  dsp:
    build:
      context: ./apps/dsp
      dockerfile: Dockerfile
    container_name: mymusic-dsp
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - mymusic-net
