# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Remove MailHog — use real SMTP via env vars
  mailhog:
    profiles:
      - donotstart

  api:
    build:
      target: prod
    restart: always
    environment:
      NODE_ENV: production
    # Remove hot-reload volume mounts
    volumes: []

  postgres:
    restart: always

  redis:
    restart: always

  minio:
    restart: always

  dsp:
    restart: always
